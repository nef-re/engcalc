services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: engineering
      POSTGRES_USER: engineering
      POSTGRES_PASSWORD: engineering
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://engineering:engineering@db:5432/engineering
      REDIS_URL: redis://redis:6379/0
      DJANGO_DEBUG: "1"
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    depends_on:
      - db
      - redis

  frontend:
    build: ./frontend
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata:
